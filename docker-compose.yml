services:


  # ========================================
  # FRONTEND
  # ========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.05"

  # ========================================
  # API GATEWAY
  # ========================================
  gateway:
    image: traefik:v3.2
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:80"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
      - "--tracing.otlp=true"
      - "--tracing.otlp.http.endpoint=http://jaeger:4318/v1/traces"
    ports:
      - "8100:80"      # API Gateway
      - "8101:8080"    # Traefik Dashboard
    volumes:
      - ./gateway/traefik.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - frontend
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ========================================
  # AUTH SERVICE
  # ========================================
  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/api/auth`)"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.services.auth.loadbalancer.server.port=3000"
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  auth-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ========================================
  # USER SERVICE
  # ========================================
  user-service:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.user.rule=PathPrefix(`/api/users`)"
      - "traefik.http.routers.user.entrypoints=web"
      - "traefik.http.services.user.loadbalancer.server.port=3000"
    depends_on:
      user-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  user-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
      POSTGRES_DB: ${USER_DB_NAME}
    volumes:
      - user-db-data:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER} -d ${USER_DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ========================================
  # INVENTORY SERVICE
  # ========================================
  inventory-service:
    build:
      context: ./services/inventory
      dockerfile: Dockerfile
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.inventory.rule=PathPrefix(`/api/inventory`)"
      - "traefik.http.routers.inventory.entrypoints=web"
      - "traefik.http.services.inventory.loadbalancer.server.port=3000"
    depends_on:
      inventory-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  inventory-db:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${INVENTORY_DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${INVENTORY_DB_PASSWORD}
      MONGO_INITDB_DATABASE: ${INVENTORY_DB_NAME}
    volumes:
      - inventory-db-data:/data/db
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ========================================
  # CACHE
  # ========================================
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 96M
          cpus: "0.10"

  # ========================================
  # MONITORING
  # ========================================
  prometheus:
    image: prom/prometheus:v3.4.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - backend
      - monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3100:3000"
    depends_on:
      - prometheus
    networks:
      - monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

# ========================================

  # ========================================
  # SERVICE MESH — ENVOY SIDECAR PROXIES
  # ========================================
  # WHY sidecars instead of modifying services?
  # The sidecar pattern keeps infrastructure concerns (retries, timeouts,
  # circuit breaking) separate from business logic. Your Go code stays
  # focused on business rules. The mesh handles reliability.
  #
  # Traffic flow: Traefik → Envoy Sidecar → Service
  # The service doesn't know the proxy exists.

  auth-proxy:
    image: envoyproxy/envoy:v1.31-latest
    volumes:
      - ./mesh/envoy-auth.yml:/etc/envoy/envoy.yaml:ro
    depends_on:
      - auth-service
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: 0.10

  user-proxy:
    image: envoyproxy/envoy:v1.31-latest
    volumes:
      - ./mesh/envoy-user.yml:/etc/envoy/envoy.yaml:ro
    depends_on:
      - user-service
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: 0.10

  inventory-proxy:
    image: envoyproxy/envoy:v1.31-latest
    volumes:
      - ./mesh/envoy-inventory.yml:/etc/envoy/envoy.yaml:ro
    depends_on:
      - inventory-service
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: 0.10
  # ========================================
  # DISTRIBUTED TRACING
  # ========================================
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
    networks:
      - backend
      - monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

# NETWORKS
# ========================================
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  monitoring:
    driver: bridge

# ========================================
# VOLUMES
# ========================================
volumes:
  auth-db-data:
  user-db-data:
  inventory-db-data:
  redis-data:
  prometheus-data:
  grafana-data:
