# Dynamic routing configuration for Traefik
#
# Traffic flow WITH service mesh:
#   Client → Traefik → Envoy Sidecar Proxy → Service
#
# The Envoy proxy adds: retries, timeouts, circuit breaking
# WITHOUT any changes to the Go services.

http:
  routers:
    auth:
      rule: "PathPrefix(`/api/auth`)"
      entryPoints:
        - web
      service: auth-service

    user:
      rule: "PathPrefix(`/api/users`)"
      entryPoints:
        - web
      service: user-service

    inventory:
      rule: "PathPrefix(`/api/inventory`)"
      entryPoints:
        - web
      service: inventory-service

  services:
    # Routes to Envoy sidecar proxies, NOT directly to services
    # Envoy listens on port 8080 and forwards to the service on port 3000
    auth-service:
      loadBalancer:
        servers:
          - url: "http://auth-proxy:8080"

    user-service:
      loadBalancer:
        servers:
          - url: "http://user-proxy:8080"

    inventory-service:
      loadBalancer:
        servers:
          - url: "http://inventory-proxy:8080"
