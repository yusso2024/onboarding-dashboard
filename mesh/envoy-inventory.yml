# Envoy sidecar proxy for Inventory Service
#
# WHY a sidecar proxy?
# Instead of coding retries, timeouts, and circuit breaking in every
# service (in Go), the proxy handles it at the infrastructure level.
# Add a new service? Just add another sidecar — zero code changes.
#
# This is the same pattern Kubernetes service meshes use (Istio, Linkerd).
# Envoy is the data plane proxy behind all of them.

static_resources:
  listeners:
    # Ingress listener — accepts traffic from Traefik
    - name: ingress
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: inventory_ingress
                route_config:
                  virtual_hosts:
                    - name: inventory_service
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: inventory_local
                            # RETRY POLICY — handled by proxy, not by Go code
                            # If the service returns 503 or connection fails,
                            # Envoy retries automatically. The service doesn't
                            # even know a retry happened.
                            retry_policy:
                              retry_on: "5xx,connect-failure,reset"
                              num_retries: 3
                              per_try_timeout: 3s
                            timeout: 10s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: inventory_local
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: inventory_local
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: inventory-service
                      port_value: 3000
      # CIRCUIT BREAKER — at proxy level
      # If the inventory service has 100+ pending requests, stop sending more.
      # This prevents cascade failures under load.
      circuit_breakers:
        thresholds:
          - max_connections: 100
            max_pending_requests: 50
            max_retries: 3

# Admin endpoint — exposes Envoy metrics for Prometheus
admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
