name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, user, inventory]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /dev/null ./cmd/server

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-build
    strategy:
      matrix:
        service: [auth, user, inventory]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t onboarding-${{ matrix.service }}:${{ github.sha }} services/${{ matrix.service }}

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t onboarding-frontend:${{ github.sha }} frontend/

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose
        run: docker compose -f docker-compose.yml config --quiet
