global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "traefik"
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: "auth-service"
    metrics_path: "/api/auth/health"
    static_configs:
      - targets: ["auth-service:3000"]

  - job_name: "user-service"
    metrics_path: "/api/users/health"
    static_configs:
      - targets: ["user-service:3000"]

  - job_name: "inventory-service"
    metrics_path: "/api/inventory/health"
    static_configs:
      - targets: ["inventory-service:3000"]

  # Envoy sidecar metrics — each proxy exposes stats on :9901
  # These give you per-service request counts, latency histograms,
  # circuit breaker state, retry counts — all from the proxy layer.
  - job_name: "envoy-auth"
    metrics_path: "/stats/prometheus"
    static_configs:
      - targets: ["auth-proxy:9901"]

  - job_name: "envoy-user"
    metrics_path: "/stats/prometheus"
    static_configs:
      - targets: ["user-proxy:9901"]

  - job_name: "envoy-inventory"
    metrics_path: "/stats/prometheus"
    static_configs:
      - targets: ["inventory-proxy:9901"]
